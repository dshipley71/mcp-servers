[server]
name = "mcp_unstructured"
transport = "http"
host = "0.0.0.0"
port = 8000

[tools.parse_file]
enabled = true

[tools.health]
enabled = true

[tools.tools]
enabled = true

[vlm]
enabled = false
provider_env = "UNSTRUCTURED_VLM_PROVIDER"
model_env = "UNSTRUCTURED_VLM_MODEL"
api_url_env = "UNSTRUCTURED_API_URL"
api_key_env = "UNSTRUCTURED_API_KEY"
